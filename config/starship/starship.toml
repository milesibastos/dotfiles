format = """$username$hostname$directory$git_branch$git_state$git_status
$character"""

[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = true
format = "at [$hostname]($style) "

[directory]
truncate_to_repo = false
truncation_length = 0
truncation_symbol = "…/"
